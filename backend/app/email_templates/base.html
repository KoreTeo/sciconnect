<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }}</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:12px;border:1px solid #e2e8f0;">
          <tr>
            <td style="padding:28px 32px 8px;">
              <p style="margin:0;font-size:13px;font-weight:600;color:#2563eb;letter-spacing:0.02em;">{{ app_name }}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 24px;color:#334155;font-size:15px;line-height:1.6;">
              {% block content %}{% endblock %}
              {% if cta_url %}
              <p style="margin:28px 0 0;">
                <a href="{{ cta_url }}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 24px;border-radius:8px;font-weight:600;font-size:14px;">{{ cta_label }}</a>
              </p>
              {% endif %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 28px;border-top:1px solid #f1f5f9;">
              <p style="margin:0;font-size:12px;color:#94a3b8;">© {{ year }} {{ app_name }}. Это автоматическое письмо.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
